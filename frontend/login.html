<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vixx — Log ind</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f4f6f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .kort {
      background: white;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 460px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    .logo { font-size: 1.4rem; font-weight: 700; color: #1a1a2e; margin-bottom: 8px; }
    .undertitel { color: #888; font-size: 0.9rem; margin-bottom: 32px; }

    .tabs {
      display: flex;
      gap: 4px;
      background: #f4f6f9;
      border-radius: 8px;
      padding: 4px;
      margin-bottom: 28px;
    }

    .tab {
      flex: 1;
      padding: 8px;
      border: none;
      background: transparent;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
      color: #888;
      font-weight: 500;
    }

    .tab.aktiv {
      background: white;
      color: #1a1a2e;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .felt { margin-bottom: 16px; }
    .felt label { display: block; font-size: 0.82rem; color: #555; margin-bottom: 6px; font-weight: 500; }

    .felt input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      font-size: 0.9rem;
      outline: none;
      transition: border 0.2s;
    }

    .felt input:focus { border-color: #6366f1; }

    .sektion-titel {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #aaa;
      margin: 20px 0 12px;
    }

    .knap {
      width: 100%;
      padding: 12px;
      background: #1a1a2e;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s;
    }

    .knap:hover { background: #2d2d4e; }

    .fejl {
      background: #fee2e2;
      color: #dc2626;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.85rem;
      margin-top: 12px;
      display: none;
    }

    .hjaelp {
      font-size: 0.8rem;
      color: #aaa;
      margin-top: 6px;
    }

    .platform-knap {
      flex: 1;
      padding: 9px;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      background: white;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      color: #888;
      transition: all 0.15s;
    }
    .platform-knap.aktiv {
      border-color: #6366f1;
      color: #6366f1;
      background: #eef2ff;
    }
  </style>
</head>
<body>
<div class="kort">
  <div class="logo">Vixx</div>
  <div class="undertitel">Få indsigt i din forretning — hver dag</div>

  <div class="tabs">
    <button class="tab aktiv" onclick="skiftTab('login')">Log ind</button>
    <button class="tab" onclick="skiftTab('opret')">Opret konto</button>
  </div>

  <!-- Login -->
  <div id="login-form">
    <div class="felt">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="din@email.dk">
    </div>
    <div class="felt">
      <label>Adgangskode</label>
      <input type="password" id="login-password" placeholder="••••••••">
    </div>
    <button class="knap" onclick="login()">Log ind</button>
    <div class="fejl" id="login-fejl"></div>
  </div>

  <!-- Opret konto -->
  <div id="opret-form" style="display:none">
    <div class="felt">
      <label>Email</label>
      <input type="email" id="opret-email" placeholder="din@email.dk">
    </div>
    <div class="felt">
      <label>Adgangskode</label>
      <input type="password" id="opret-password" placeholder="Vælg en adgangskode">
    </div>

    <div class="sektion-titel">Platform</div>
    <div style="display:flex;gap:8px;margin-bottom:16px">
      <button type="button" class="platform-knap aktiv" id="btn-woo" onclick="vaelgPlatform('woocommerce')">
        🛍 WooCommerce
      </button>
      <button type="button" class="platform-knap" id="btn-shopify" onclick="vaelgPlatform('shopify')">
        🟢 Shopify
      </button>
    </div>

    <div class="felt">
      <label id="url-label">Din butiks URL</label>
      <input type="text" id="opret-url" placeholder="https://minbutik.dk">
    </div>
    <div id="woo-felter">
      <div class="felt">
        <label>Consumer Key</label>
        <input type="text" id="opret-key" placeholder="ck_...">
        <div class="hjaelp">Findes i WooCommerce → Indstillinger → Avanceret → REST API</div>
      </div>
      <div class="felt">
        <label>Consumer Secret</label>
        <input type="text" id="opret-secret" placeholder="cs_...">
      </div>
    </div>
    <div id="shopify-felter" style="display:none">
      <div class="felt">
        <label>Access Token</label>
        <input type="text" id="opret-token" placeholder="shpat_...">
        <div class="hjaelp">Opret en Custom App i Shopify Admin → Apps → Develop apps</div>
      </div>
    </div>

    <button class="knap" id="opret-knap" onclick="opretKonto()">Opret konto og forbind butik</button>
    <div class="fejl" id="opret-fejl"></div>
  </div>
</div>

<script>
  // Tjek om allerede logget ind
  if (localStorage.getItem('token')) {
    window.location.href = 'dashboard.html';
  }

  function skiftTab(tab) {
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('aktiv', (i === 0 && tab === 'login') || (i === 1 && tab === 'opret'));
    });
    document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
    document.getElementById('opret-form').style.display = tab === 'opret' ? 'block' : 'none';
  }

  async function login() {
    const email = document.getElementById('login-email').value;
    const password = document.getElementById('login-password').value;

    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();
    if (!res.ok) {
      const el = document.getElementById('login-fejl');
      el.textContent = data.error;
      el.style.display = 'block';
      return;
    }

    localStorage.setItem('token', data.token);
    window.location.href = 'dashboard.html';
  }

  let aktivPlatform = 'woocommerce';

  function vaelgPlatform(platform) {
    aktivPlatform = platform;
    document.getElementById('btn-woo').classList.toggle('aktiv', platform === 'woocommerce');
    document.getElementById('btn-shopify').classList.toggle('aktiv', platform === 'shopify');
    document.getElementById('woo-felter').style.display = platform === 'woocommerce' ? 'block' : 'none';
    document.getElementById('shopify-felter').style.display = platform === 'shopify' ? 'block' : 'none';
    document.getElementById('url-label').textContent = platform === 'shopify'
      ? 'Shopify butik URL (f.eks. minbutik.myshopify.com)'
      : 'Din butiks URL';
    document.getElementById('opret-url').placeholder = platform === 'shopify'
      ? 'minbutik.myshopify.com'
      : 'https://minbutik.dk';
  }

  async function opretKonto() {
    const knap = document.getElementById('opret-knap');
    const fejl = document.getElementById('opret-fejl');
    fejl.style.display = 'none';
    knap.disabled = true;
    knap.textContent = aktivPlatform === 'shopify' ? 'Forbinder til Shopify...' : 'Forbinder til WooCommerce...';

    const body = {
      email: document.getElementById('opret-email').value,
      password: document.getElementById('opret-password').value,
      wooUrl: document.getElementById('opret-url').value,
      wooKey: aktivPlatform === 'shopify'
        ? document.getElementById('opret-token').value
        : document.getElementById('opret-key').value,
      wooSecret: aktivPlatform === 'shopify' ? null : document.getElementById('opret-secret').value,
      platform: aktivPlatform,
    };

    const res = await fetch('/api/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });

    const data = await res.json();
    if (!res.ok) {
      fejl.textContent = data.error;
      fejl.style.display = 'block';
      knap.disabled = false;
      knap.textContent = 'Opret konto og forbind butik';
      return;
    }

    localStorage.setItem('token', data.token);
    window.location.href = 'dashboard.html';
  }
</script>
</body>
</html>
