<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Webshop Co-pilot — Log ind</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f4f6f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .kort {
      background: white;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 460px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    .logo { font-size: 1.4rem; font-weight: 700; color: #1a1a2e; margin-bottom: 8px; }
    .undertitel { color: #888; font-size: 0.9rem; margin-bottom: 32px; }

    .tabs {
      display: flex;
      gap: 4px;
      background: #f4f6f9;
      border-radius: 8px;
      padding: 4px;
      margin-bottom: 28px;
    }

    .tab {
      flex: 1;
      padding: 8px;
      border: none;
      background: transparent;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
      color: #888;
      font-weight: 500;
    }

    .tab.aktiv {
      background: white;
      color: #1a1a2e;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .felt { margin-bottom: 16px; }
    .felt label { display: block; font-size: 0.82rem; color: #555; margin-bottom: 6px; font-weight: 500; }

    .felt input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      font-size: 0.9rem;
      outline: none;
      transition: border 0.2s;
    }

    .felt input:focus { border-color: #6366f1; }

    .sektion-titel {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #aaa;
      margin: 20px 0 12px;
    }

    .knap {
      width: 100%;
      padding: 12px;
      background: #1a1a2e;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s;
    }

    .knap:hover { background: #2d2d4e; }

    .fejl {
      background: #fee2e2;
      color: #dc2626;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.85rem;
      margin-top: 12px;
      display: none;
    }

    .hjaelp {
      font-size: 0.8rem;
      color: #aaa;
      margin-top: 6px;
    }
  </style>
</head>
<body>
<div class="kort">
  <div class="logo">Webshop Co-pilot</div>
  <div class="undertitel">Få indsigt i din forretning — hver dag</div>

  <div class="tabs">
    <button class="tab aktiv" onclick="skiftTab('login')">Log ind</button>
    <button class="tab" onclick="skiftTab('opret')">Opret konto</button>
  </div>

  <!-- Login -->
  <div id="login-form">
    <div class="felt">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="din@email.dk">
    </div>
    <div class="felt">
      <label>Adgangskode</label>
      <input type="password" id="login-password" placeholder="••••••••">
    </div>
    <button class="knap" onclick="login()">Log ind</button>
    <div class="fejl" id="login-fejl"></div>
  </div>

  <!-- Opret konto -->
  <div id="opret-form" style="display:none">
    <div class="felt">
      <label>Email</label>
      <input type="email" id="opret-email" placeholder="din@email.dk">
    </div>
    <div class="felt">
      <label>Adgangskode</label>
      <input type="password" id="opret-password" placeholder="Vælg en adgangskode">
    </div>

    <div class="sektion-titel">WooCommerce forbindelse</div>

    <div class="felt">
      <label>Din butiks URL</label>
      <input type="text" id="opret-url" placeholder="https://minbutik.dk">
    </div>
    <div class="felt">
      <label>Consumer Key</label>
      <input type="text" id="opret-key" placeholder="ck_...">
      <div class="hjaelp">Findes i WooCommerce → Indstillinger → Avanceret → REST API</div>
    </div>
    <div class="felt">
      <label>Consumer Secret</label>
      <input type="text" id="opret-secret" placeholder="cs_...">
    </div>

    <button class="knap" onclick="opretKonto()">Opret konto og forbind butik</button>
    <div class="fejl" id="opret-fejl"></div>
  </div>
</div>

<script>
  // Tjek om allerede logget ind
  if (localStorage.getItem('token')) {
    window.location.href = 'index.html';
  }

  function skiftTab(tab) {
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('aktiv', (i === 0 && tab === 'login') || (i === 1 && tab === 'opret'));
    });
    document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
    document.getElementById('opret-form').style.display = tab === 'opret' ? 'block' : 'none';
  }

  async function login() {
    const email = document.getElementById('login-email').value;
    const password = document.getElementById('login-password').value;

    const res = await fetch('https://webshop-copilot.onrender.com/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();
    if (!res.ok) {
      const el = document.getElementById('login-fejl');
      el.textContent = data.error;
      el.style.display = 'block';
      return;
    }

    localStorage.setItem('token', data.token);
    window.location.href = 'index.html';
  }

  async function opretKonto() {
    const body = {
      email: document.getElementById('opret-email').value,
      password: document.getElementById('opret-password').value,
      wooUrl: document.getElementById('opret-url').value,
      wooKey: document.getElementById('opret-key').value,
      wooSecret: document.getElementById('opret-secret').value,
    };

    const res = await fetch('https://webshop-copilot.onrender.com/api/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });

    const data = await res.json();
    if (!res.ok) {
      const el = document.getElementById('opret-fejl');
      el.textContent = data.error;
      el.style.display = 'block';
      return;
    }

    localStorage.setItem('token', data.token);
    window.location.href = 'index.html';
  }
</script>
</body>
</html>
