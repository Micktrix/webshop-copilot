<!DOCTYPE html>
<html lang="da">
<head>
  <script src="/cookie-banner.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nulstil adgangskode — Vixx</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; display: flex; background: #0f172a; align-items: center; justify-content: center; padding: 24px; }
    .kort { background: white; border-radius: 18px; padding: 40px; width: 100%; max-width: 400px; box-shadow: 0 4px 32px rgba(0,0,0,0.2); }
    .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; justify-content: center; }
    .brand-ikon { width: 36px; height: 36px; background: #6366f1; border-radius: 9px; display: flex; align-items: center; justify-content: center; color: white; font-size: 1rem; }
    .brand-navn { font-size: 1.1rem; font-weight: 700; color: #0f172a; }
    h1 { font-size: 1.2rem; font-weight: 700; color: #0f172a; margin-bottom: 6px; text-align: center; }
    .undertitel { color: #94a3b8; font-size: 0.88rem; margin-bottom: 28px; text-align: center; }
    .felt { margin-bottom: 16px; }
    .felt label { display: block; font-size: 0.82rem; color: #475569; margin-bottom: 6px; font-weight: 600; }
    .felt input { width: 100%; padding: 11px 14px; border: 1.5px solid #e2e8f0; border-radius: 9px; font-size: 0.9rem; outline: none; transition: border 0.15s, box-shadow 0.15s; color: #0f172a; background: #fafafa; }
    .felt input:focus { border-color: #6366f1; background: white; box-shadow: 0 0 0 3px rgba(99,102,241,0.1); }
    .knap { width: 100%; padding: 13px; background: #6366f1; color: white; border: none; border-radius: 9px; font-size: 0.95rem; font-weight: 700; cursor: pointer; margin-top: 8px; transition: background 0.2s; }
    .knap:hover { background: #4f46e5; }
    .knap:disabled { background: #c7d2fe; cursor: not-allowed; }
    .besked { border-radius: 8px; padding: 12px 14px; font-size: 0.88rem; margin-top: 14px; display: none; }
    .besked.fejl { background: #fee2e2; color: #dc2626; }
    .besked.ok { background: #dcfce7; color: #16a34a; }
    .til-login { text-align: center; margin-top: 20px; font-size: 0.82rem; color: #94a3b8; }
    .til-login a { color: #6366f1; text-decoration: none; font-weight: 600; }
  </style>
</head>
<body>
<div class="kort">
  <div class="brand">
    <div class="brand-ikon">◈</div>
    <span class="brand-navn">Vixx</span>
  </div>

  <div id="anmod-view">
    <h1>Glemt adgangskode?</h1>
    <p class="undertitel">Indtast din email — vi sender dig et link</p>
    <div class="felt">
      <label>Email</label>
      <input type="email" id="email" placeholder="din@email.dk" autocomplete="email">
    </div>
    <button class="knap" id="anmod-knap" onclick="anmodNulstil()">Send nulstillingslink</button>
    <div class="besked" id="anmod-besked"></div>
    <div class="til-login"><a href="login.html">← Tilbage til login</a></div>
  </div>

  <div id="nulstil-view" style="display:none">
    <h1>Ny adgangskode</h1>
    <p class="undertitel">Vælg en ny adgangskode til din konto</p>
    <div class="felt">
      <label>Ny adgangskode</label>
      <input type="password" id="ny-password" placeholder="Mindst 8 tegn" autocomplete="new-password">
    </div>
    <div class="felt">
      <label>Gentag adgangskode</label>
      <input type="password" id="gentag-password" placeholder="Gentag adgangskoden" autocomplete="new-password">
    </div>
    <button class="knap" id="nulstil-knap" onclick="nulstil()">Gem ny adgangskode</button>
    <div class="besked" id="nulstil-besked"></div>
  </div>

  <div id="success-view" style="display:none;text-align:center">
    <div style="font-size:2.5rem;margin-bottom:16px">✓</div>
    <h1>Adgangskode opdateret</h1>
    <p class="undertitel" style="margin-bottom:24px">Du kan nu logge ind med din nye adgangskode</p>
    <a href="login.html" class="knap" style="display:block;text-decoration:none;text-align:center">Gå til login →</a>
  </div>
</div>

<script>
  const token = new URLSearchParams(location.search).get('token');
  if (token) {
    document.getElementById('anmod-view').style.display = 'none';
    document.getElementById('nulstil-view').style.display = 'block';
  }

  async function anmodNulstil() {
    const email = document.getElementById('email').value.trim();
    const knap = document.getElementById('anmod-knap');
    const besked = document.getElementById('anmod-besked');
    if (!email) return;
    knap.disabled = true;
    knap.textContent = 'Sender...';
    await fetch('/api/glemt-adgangskode', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });
    besked.textContent = 'Hvis emailen er registreret, har vi sendt et link. Tjek din indbakke.';
    besked.className = 'besked ok';
    besked.style.display = 'block';
    knap.disabled = true;
    knap.textContent = 'Sendt';
  }

  async function nulstil() {
    const password = document.getElementById('ny-password').value;
    const gentag = document.getElementById('gentag-password').value;
    const knap = document.getElementById('nulstil-knap');
    const besked = document.getElementById('nulstil-besked');
    besked.style.display = 'none';
    if (password.length < 8) {
      besked.textContent = 'Adgangskoden skal være mindst 8 tegn.';
      besked.className = 'besked fejl';
      besked.style.display = 'block';
      return;
    }
    if (password !== gentag) {
      besked.textContent = 'Adgangskoderne matcher ikke.';
      besked.className = 'besked fejl';
      besked.style.display = 'block';
      return;
    }
    knap.disabled = true;
    knap.textContent = 'Gemmer...';
    const res = await fetch('/api/nulstil-adgangskode', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, password })
    });
    const data = await res.json();
    if (!res.ok) {
      besked.textContent = data.error;
      besked.className = 'besked fejl';
      besked.style.display = 'block';
      knap.disabled = false;
      knap.textContent = 'Gem ny adgangskode';
      return;
    }
    document.getElementById('nulstil-view').style.display = 'none';
    document.getElementById('success-view').style.display = 'block';
  }

  document.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    if (token) nulstil();
    else anmodNulstil();
  });
</script>
</body>
</html>
